pipeline:
  name: golang-cd-pipeline
  identifier: golang_cd_pipeline
  projectIdentifier: YOUR_PROJECT_ID
  orgIdentifier: default
  tags:
    app: my-go-app
    type: cd

  stages:
    - stage:
        name: Deploy_To_EKS
        identifier: deploy_to_eks
        type: Deployment
        spec:
          deploymentType: Kubernetes

          service:
            serviceRef: my_go_app_service
            serviceInputs:
              serviceDefinition:
                type: Kubernetes
                spec:
                  artifacts:
                    primary:
                      primaryArtifactRef: ecr_artifact
                      sources:
                        - identifier: ecr_artifact
                          type: Ecr
                          spec:
                            connectorRef: aws_ecr_connector
                            region: us-east-1
                            imagePath: my-go-app
                            tag: <+pipeline.sequenceId>

          environment:
            environmentRef: production
            deployToAll: false
            infrastructureDefinitions:
              - identifier: dummy_eks_infra
                inputs:
                  identifier: dummy_eks_infra
                  type: KubernetesDirect
                  spec:
                    namespace: my-app-ns

          execution:
            steps:
              - step:
                  type: K8sApply
                  name: Apply Namespace
                  identifier: apply_namespace
                  timeout: 5m
                  spec:
                    filePaths:
                      - deployment/k8s/namespace.yaml
                    skipDryRun: false

              - step:
                  type: K8sRollingDeploy
                  name: Rolling Deploy
                  identifier: rolling_deploy
                  timeout: 10m
                  spec:
                    skipDryRun: false
                    pruningEnabled: false

              - step:
                  type: K8sApply
                  name: Apply Service
                  identifier: apply_service
                  timeout: 5m
                  spec:
                    filePaths:
                      - deployment/k8s/service.yaml
                    skipDryRun: false

              - step:
                  type: Run
                  name: Verify Deployment
                  identifier: verify_deployment
                  timeout: 5m
                  spec:
                    connectorRef: eks_connector
                    shell: Bash
                    command: |
                      echo "=== Verifying Deployment on Dummy-EKS ==="
                      kubectl get pods -n my-app-ns
                      kubectl get svc -n my-app-ns
                      echo ""
                      echo "=== Pod Status ==="
                      kubectl rollout status deployment/my-go-app -n my-app-ns
                      echo ""
                      echo "=== LoadBalancer URL ==="
                      kubectl get svc my-go-app-service -n my-app-ns \
                        -o jsonpath='{.status.loadBalancer.ingress[0].hostname}'
                      echo ""
                      echo "Deployment Successful!"

            rollbackSteps:
              - step:
                  type: K8sRollingRollback
                  name: Rollback Deployment
                  identifier: rollback_deployment
                  timeout: 10m
                  spec: {}

  triggers:
    - trigger:
        name: On CI Pipeline Success
        identifier: on_ci_success
        type: PipelineSuccess
        spec:
          inputYaml: |
            pipeline:
              identifier: golang_cd_pipeline
          pipelineRef: golang_ci_pipeline
          projectIdentifier: YOUR_PROJECT_ID
          orgIdentifier: default
