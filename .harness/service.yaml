service:
  name: my-go-app-service
  identifier: my_go_app_service
  orgIdentifier: default
  projectIdentifier: YOUR_PROJECT_ID
  serviceDefinition:
    type: Kubernetes
    spec:
      manifests:
        - manifest:
            identifier: k8s_manifests
            type: K8sManifest
            spec:
              store:
                type: HarnessCode
                spec:
                  connectorRef: harness_code_connector
                  gitFetchType: Branch
                  branch: main
                  paths:
                    - deployment/k8s/namespace.yaml
                    - deployment/k8s/deployment.yaml
                    - deployment/k8s/service.yaml
                  repoName: my-go-app
              skipResourceVersioning: false
              enableDeclarativeRollback: false

      artifacts:
        primary:
          primaryArtifactRef: ecr_artifact
          sources:
            - identifier: ecr_artifact
              type: Ecr
              spec:
                connectorRef: aws_ecr_connector
                region: us-east-1
                imagePath: my-go-app
                tag: latest
