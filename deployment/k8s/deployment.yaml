apiVersion: apps/v1
kind: Deployment
metadata:
  name: my-go-app
  namespace: my-app-ns
  labels:
    app: my-go-app
    managed-by: harness
spec:
  replicas: 2
  selector:
    matchLabels:
      app: my-go-app
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app: my-go-app
    spec:
      containers:
        - name: my-go-app
          image: <+artifact.image>
          imagePullPolicy: Always
          ports:
            - containerPort: 8080
          env:
            - name: PORT
              value: "8080"
            - name: APP_VERSION
              value: <+artifact.tag>
            - name: GO111MODULE
              value: "on"
          resources:
            requests:
              memory: "64Mi"
              cpu: "100m"
            limits:
              memory: "256Mi"
              cpu: "500m"
          livenessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 15
            periodSeconds: 20
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /ready
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 10
            failureThreshold: 3
      restartPolicy: Always
      terminationGracePeriodSeconds: 30
