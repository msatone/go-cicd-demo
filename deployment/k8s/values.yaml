namespace:
  name: my-app-ns

replicaCount: 2

image:
  repository: <+artifact.image>
  pullPolicy: Always
  tag: <+artifact.tag>

service:
  type: LoadBalancer
  port: 80
  targetPort: 8080

container:
  port: 8080

resources:
  requests:
    memory: "64Mi"
    cpu: "100m"
  limits:
    memory: "256Mi"
    cpu: "500m"

probes:
  liveness:
    path: /health
    initialDelaySeconds: 15
    periodSeconds: 20
    failureThreshold: 3

  readiness:
    path: /ready
    initialDelaySeconds: 5
    periodSeconds: 10
    failureThreshold: 3